<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippocampus Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-950 text-gray-100 overflow-hidden">
    <div class="flex h-screen">
        <!-- 3D Canvas Area -->
        <div class="flex-1 relative">
            <div id="canvas-container" class="w-full h-full"></div>
            <!-- Overlay: Gate Result -->
            <div id="gate-overlay" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none">
                <div id="gate-result-card" class="bg-gray-900/90 backdrop-blur rounded-2xl p-6 max-w-md border border-gray-700 shadow-2xl">
                    <h3 class="text-lg font-bold mb-2" id="gate-result-title">Gate Evaluation</h3>
                    <div id="gate-result-body" class="text-sm space-y-1"></div>
                </div>
            </div>
        </div>

        <!-- Side Panel -->
        <div class="w-96 bg-gray-900/80 backdrop-blur border-l border-gray-800 flex flex-col overflow-hidden">
            <!-- Header -->
            <div class="p-4 border-b border-gray-800">
                <h1 class="text-xl font-bold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
                    Hippocampus
                </h1>
                <p class="text-xs text-gray-500 mt-1">Biomimetic Cognitive Memory System</p>
            </div>

            <!-- Stats Cards -->
            <div class="p-4 border-b border-gray-800">
                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-gray-800/60 rounded-lg p-2 text-center">
                        <div class="text-2xl font-bold text-cyan-400" id="stat-l1">0</div>
                        <div class="text-xs text-gray-500">L1 STM</div>
                    </div>
                    <div class="bg-gray-800/60 rounded-lg p-2 text-center">
                        <div class="text-2xl font-bold text-amber-400" id="stat-l2">0</div>
                        <div class="text-xs text-gray-500">L2 Mid</div>
                    </div>
                    <div class="bg-gray-800/60 rounded-lg p-2 text-center">
                        <div class="text-2xl font-bold text-purple-400" id="stat-l3">0</div>
                        <div class="text-xs text-gray-500">L3 LTM</div>
                    </div>
                </div>
                <div class="mt-2 flex items-center justify-between text-xs text-gray-500">
                    <span>Total: <span id="stat-total" class="text-gray-300">0</span></span>
                    <span id="ws-status" class="flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-gray-600 inline-block"></span> Disconnected
                    </span>
                </div>
            </div>

            <!-- Brain Region Gauges -->
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-sm font-semibold text-gray-400 mb-3">Brain Regions</h2>
                <div class="space-y-2">
                    <div class="flex items-center gap-2">
                        <span class="text-xs w-16 text-red-400">Amygdala</span>
                        <div class="flex-1 h-4 bg-gray-800 rounded-full overflow-hidden">
                            <div id="gauge-amygdala" class="h-full bg-gradient-to-r from-red-600 to-red-400 rounded-full transition-all duration-500" style="width:0%"></div>
                        </div>
                        <span class="text-xs w-10 text-right text-gray-400" id="score-amygdala">0.00</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs w-16 text-yellow-400">Hippocamp</span>
                        <div class="flex-1 h-4 bg-gray-800 rounded-full overflow-hidden">
                            <div id="gauge-hippocampus" class="h-full bg-gradient-to-r from-yellow-600 to-yellow-400 rounded-full transition-all duration-500" style="width:0%"></div>
                        </div>
                        <span class="text-xs w-10 text-right text-gray-400" id="score-hippocampus">0.00</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs w-16 text-blue-400">Prefrontal</span>
                        <div class="flex-1 h-4 bg-gray-800 rounded-full overflow-hidden">
                            <div id="gauge-prefrontal" class="h-full bg-gradient-to-r from-blue-600 to-blue-400 rounded-full transition-all duration-500" style="width:0%"></div>
                        </div>
                        <span class="text-xs w-10 text-right text-gray-400" id="score-prefrontal">0.00</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs w-16 text-green-400">Temporal</span>
                        <div class="flex-1 h-4 bg-gray-800 rounded-full overflow-hidden">
                            <div id="gauge-temporal" class="h-full bg-gradient-to-r from-green-600 to-green-400 rounded-full transition-all duration-500" style="width:0%"></div>
                        </div>
                        <span class="text-xs w-10 text-right text-gray-400" id="score-temporal">0.00</span>
                    </div>
                </div>
                <div class="mt-3 flex items-center gap-2">
                    <span class="text-xs text-gray-500">Decision:</span>
                    <span class="text-sm font-bold" id="decision-score">0.000</span>
                    <span class="text-xs px-2 py-0.5 rounded-full" id="decision-badge">IDLE</span>
                </div>
            </div>

            <!-- Gate Evaluation Input -->
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-sm font-semibold text-gray-400 mb-2">Gate Evaluate</h2>
                <div class="flex gap-2">
                    <input id="gate-input" type="text" placeholder="Enter message to evaluate..."
                        class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-purple-500 focus:outline-none">
                    <button onclick="doGate(false)" class="px-3 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium transition-colors">
                        Eval
                    </button>
                    <button onclick="doGate(true)" class="px-3 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm font-medium transition-colors">
                        Write
                    </button>
                </div>
            </div>

            <!-- Search -->
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-sm font-semibold text-gray-400 mb-2">Search Memories</h2>
                <div class="flex gap-2">
                    <input id="search-input" type="text" placeholder="Query..."
                        class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-cyan-500 focus:outline-none">
                    <button onclick="doSearch()" class="px-3 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm font-medium transition-colors">
                        Recall
                    </button>
                </div>
                <div id="search-results" class="mt-2 max-h-32 overflow-y-auto text-xs space-y-1"></div>
            </div>

            <!-- Recent Memory Feed -->
            <div class="flex-1 p-4 overflow-y-auto">
                <h2 class="text-sm font-semibold text-gray-400 mb-2">Recent Memories</h2>
                <div class="flex gap-2 mb-2">
                    <button onclick="loadEngrams('L1')" class="px-2 py-1 text-xs bg-cyan-900/40 hover:bg-cyan-800/60 rounded transition-colors">L1</button>
                    <button onclick="loadEngrams('L2')" class="px-2 py-1 text-xs bg-amber-900/40 hover:bg-amber-800/60 rounded transition-colors">L2</button>
                    <button onclick="loadEngrams('L3')" class="px-2 py-1 text-xs bg-purple-900/40 hover:bg-purple-800/60 rounded transition-colors">L3</button>
                </div>
                <div id="engram-feed" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
