<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海马体认知系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22none%22 stroke=%22%2300f3ff%22 stroke-width=%225%22 opacity=%220.5%22/><circle cx=%2250%22 cy=%2250%22 r=%2210%22 fill=%22%2300f3ff%22/><path d=%22M50 50 L20 20 M50 50 L80 20 M50 50 L50 85%22 stroke=%22%2300f3ff%22 stroke-width=%223%22 stroke-linecap=%22round%22 opacity=%220.8%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="bg-gray-950 text-gray-100 overflow-x-hidden md:overflow-hidden selection:bg-cyan-500/30">
    <!-- 背景 3D 渲染 -->
    <div id="canvas-container" class="fixed inset-0 -z-10"></div>

    <!-- SVG Defs for gradients (hidden, used by CSS) -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
        <defs>
            <linearGradient id="importanceGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#00f3ff"/>
                <stop offset="100%" stop-color="#3b82f6"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- 左侧面板：状态与监控 -->
    <div id="panel-left" class="relative md:fixed top-0 md:top-6 left-0 md:left-6 z-10 w-full md:w-80 p-4 md:p-0 space-y-4 pointer-events-none">
        <div class="hud-panel pointer-events-auto mt-12 md:mt-0">
            <div class="flex items-center justify-end mb-4">
                <div id="ws-status" class="text-g5 uppercase tracking-widest flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-600"></span> 离线
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <div class="stat-box">
                    <div class="text-g1 text-cyan-400 font-mono" id="stat-l1">0</div>
                    <div class="text-g5 uppercase mt-1">L1 短期</div>
                    <div class="sparkline-container"><div id="spark-l1" class="sparkline-fill bg-cyan-400/80" style="width: 0%"></div></div>
                </div>
                <div class="stat-box">
                    <div class="text-g1 text-amber-400 font-mono" id="stat-l2">0</div>
                    <div class="text-g5 uppercase mt-1">L2 中期</div>
                    <div class="sparkline-container"><div id="spark-l2" class="sparkline-fill bg-amber-400/80" style="width: 0%"></div></div>
                </div>
                <div class="stat-box">
                    <div class="text-g1 text-purple-400 font-mono" id="stat-l3">0</div>
                    <div class="text-g5 uppercase mt-1">L3 长期</div>
                    <div class="sparkline-container"><div id="spark-l3" class="sparkline-fill bg-purple-400/80" style="width: 0%"></div></div>
                </div>
            </div>
            <div class="mt-3 flex justify-between">
                <span class="text-g5 uppercase font-mono">总印迹 (TOTAL)</span>
                <span id="stat-total" class="text-g4 text-gray-200">0</span>
            </div>
        </div>

        <div class="hud-panel pointer-events-auto">
            <h2 class="text-g3 mb-5 flex justify-between">神经活动 <span>Real-time</span></h2>
            <div class="space-y-5">
                <!-- 脑区进度条 (Source Anchors) -->
                <div class="gauge-container" id="row-amygdala">
                    <div class="flex justify-between mb-1.5">
                        <span class="text-g4 text-red-400/80 uppercase">Amygdala</span>
                        <span class="text-g4 text-gray-400" id="score-amygdala">0.00</span>
                    </div>
                    <div class="h-1.5 bg-gray-800/50 rounded-full overflow-hidden border border-gray-700/30">
                        <div id="gauge-amygdala" class="h-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)] transition-all duration-150" style="width:0%"></div>
                    </div>
                </div>
                <div class="gauge-container" id="row-hippocampus">
                    <div class="flex justify-between mb-1.5">
                        <span class="text-g4 text-yellow-400/80 uppercase">Hippocampus</span>
                        <span class="text-g4 text-gray-400" id="score-hippocampus">0.00</span>
                    </div>
                    <div class="h-1.5 bg-gray-800/50 rounded-full overflow-hidden border border-gray-700/30">
                        <div id="gauge-hippocampus" class="h-full bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.5)] transition-all duration-150" style="width:0%"></div>
                    </div>
                </div>
                <div class="gauge-container" id="row-prefrontal">
                    <div class="flex justify-between mb-1.5">
                        <span class="text-g4 text-blue-400/80 uppercase">Prefrontal</span>
                        <span class="text-g4 text-gray-400" id="score-prefrontal">0.00</span>
                    </div>
                    <div class="h-1.5 bg-gray-800/50 rounded-full overflow-hidden border border-gray-700/30">
                        <div id="gauge-prefrontal" class="h-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)] transition-all duration-150" style="width:0%"></div>
                    </div>
                </div>
                <div class="gauge-container" id="row-temporal">
                    <div class="flex justify-between mb-1.5">
                        <span class="text-g4 text-green-400/80 uppercase">Temporal</span>
                        <span class="text-g4 text-gray-400" id="score-temporal">0.00</span>
                    </div>
                    <div class="h-1.5 bg-gray-800/50 rounded-full overflow-hidden border border-gray-700/30">
                        <div id="gauge-temporal" class="h-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)] transition-all duration-150" style="width:0%"></div>
                    </div>
                </div>
            </div>
            <div class="mt-6 pt-4 border-t border-gray-800/50 flex items-center justify-between">
                <span class="text-g5 uppercase font-mono tracking-tighter">Decision Confidence</span>
                <div class="flex items-center gap-3">
                    <span class="text-g1 text-cyan-400 font-mono" id="decision-score">0.000</span>
                    <span id="decision-badge" class="text-g5 px-2 py-0.5 rounded border border-gray-700 uppercase">Idle</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧面板：记忆与检索 -->
    <div id="panel-right" class="relative md:fixed top-0 md:top-6 right-0 md:right-6 bottom-32 z-10 w-full md:w-96 p-4 md:p-0 h-auto md:h-auto pb-32 md:pb-0 space-y-4 flex flex-col pointer-events-none">
        <div class="hud-panel pointer-events-auto">
            <h2 class="text-g3 mb-4">记忆检索接口 (RECALL)</h2>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="输入关键字..."
                    class="flex-1 bg-gray-950/50 border border-gray-700/50 rounded px-3 py-2 text-g2 focus:border-cyan-500/50 focus:outline-none transition-colors font-mono">
                <button onclick="doSearch()" class="px-4 py-2 bg-cyan-900/30 hover:bg-cyan-800/50 border border-cyan-700/30 rounded text-g4 text-cyan-400 transition-all">执行</button>
            </div>
            <div id="search-results" class="mt-4 max-h-40 overflow-y-auto space-y-2 pr-1 custom-scrollbar"></div>
        </div>

        <div class="hud-panel pointer-events-auto flex-1 flex flex-col min-h-0">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-g3">记忆流 (STREAM)</h2>
                <div class="flex gap-1" id="layer-tabs">
                    <button onclick="loadEngrams('L1')" class="control-btn px-2 py-0.5 active">L1</button>
                    <button onclick="loadEngrams('L2')" class="control-btn px-2 py-0.5">L2</button>
                    <button onclick="loadEngrams('L3')" class="control-btn px-2 py-0.5">L3</button>
                </div>
            </div>
            <div id="engram-feed" class="flex-1 overflow-y-auto overflow-x-hidden custom-scrollbar pb-2"></div>
        </div>
    </div>

    <!-- 底部：命令输入 -->
    <div id="panel-bottom" class="fixed bottom-2 md:bottom-8 left-1/2 -translate-x-1/2 z-20 w-[95%] md:w-[600px] pointer-events-none">
        <!-- 评估结果 -->
        <div id="gate-overlay" class="hidden w-full mb-4">
            <div id="gate-result-card" class="gate-card w-full">
                <div class="gate-card-scanline"></div>
                <div class="flex items-center gap-3 mb-3 border-b border-cyan-500/20 pb-3">
                    <div id="gate-result-icon" class="w-6 h-6 text-cyan-400">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h3 class="text-g3 flex-1 !text-cyan-400" id="gate-result-title">门控评估</h3>
                    <div class="text-g5 uppercase font-mono bg-cyan-500/10 px-2 py-0.5 border border-cyan-500/30 text-cyan-400" id="gate-ready-text">PROCESSING</div>
                </div>
                <div id="gate-result-body" class="text-g2 font-mono text-cyan-100/90 whitespace-pre-line min-h-[40px] leading-relaxed"></div>
            </div>
        </div>

        <div class="hud-panel p-1.5 pointer-events-auto bg-gray-900/40 backdrop-blur-xl border-cyan-500/20 shadow-[0_0_30px_rgba(0,0,0,0.5)]">
            <div class="flex items-center gap-2">
                <div class="pl-4 text-cyan-500/50 font-mono text-lg md:block hidden">&gt;</div>
                <input id="gate-input" type="text" placeholder="输入认知消息..."
                    class="flex-1 bg-transparent border-none px-2 py-3 text-g2 focus:outline-none font-mono placeholder:text-gray-600">
                <div class="flex gap-1 pr-1">
                    <button onclick="doGate(false)" class="control-btn px-3 md:px-4 py-2 !text-[10px] md:!text-[11px]">评估</button>
                    <button onclick="doGate(true)" class="control-btn px-3 md:px-4 py-2 !text-[10px] md:!text-[11px] !border-cyan-500/30 !text-cyan-400">写入</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 控制 -->
    <div class="fixed top-4 right-4 md:top-auto md:bottom-8 md:right-6 z-20 flex gap-2 md:gap-3">
        <button id="btn-focus" class="control-btn" onclick="toggleFocusMode()">专注</button>
        <button id="btn-audio" class="control-btn" onclick="toggleAudio()">静音</button>
    </div>

    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden opacity-0 transition-all duration-300">
        <div class="hud-panel w-80 p-6 border-l-4 border-l-red-500 transform scale-95 transition-all duration-300" id="delete-modal">
            <div class="flex items-center gap-3 mb-4">
                <div class="text-red-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 class="text-g3 text-gray-100 uppercase tracking-widest">确认删除印迹</h3>
            </div>
            <p class="text-g2 text-gray-400 mb-6 font-mono text-xs leading-relaxed uppercase">此操作将从海马体长期存储库中永久移除该神经印迹，无法撤销。确认继续？</p>
            <div class="flex gap-2">
                <button onclick="closeDeleteModal()" class="flex-1 control-btn !bg-gray-800/30">CANCEL</button>
                <button id="modal-confirm-btn" class="flex-1 control-btn !border-red-500/30 !text-red-400 hover:!bg-red-500/10 hover:!border-red-500/60">CONFIRM</button>
            </div>
        </div>
    </div>

    <audio id="sound-hover" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="sound-ambient" src="https://assets.mixkit.co/active_storage/sfx/2852/2852-preview.mp3" loop preload="auto"></audio>
    <audio id="sound-type" src="https://assets.mixkit.co/active_storage/sfx/2569/2569-preview.mp3" preload="auto"></audio>

    <script type="module" src="/app.js"></script>
</body>
</html>
